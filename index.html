<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PAKO OS · Favoritos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --bg: #f7f5f0;
      --panel: #ffffff;
      --text: #171717;
      --muted: #77736b;
      --line: #e7e1d7;
      --gold: #b58a2a;
      --blue: #182642;
      --danger: #b42318;
      --danger-soft: #fdf0ef;
      --radius: 20px;
      --shadow: 0 8px 40px rgba(24,38,66,.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    .shell {
      width: min(820px, calc(100% - 36px));
      margin: auto;
      padding: 36px 0 60px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--blue);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 22px;
      box-shadow: 0 4px 18px rgba(24,38,66,.2);
      flex-shrink: 0;
    }
    .brand-text .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .18em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .brand-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--blue);
    }
    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: rgba(24,38,66,.07);
      border-radius: 999px;
      padding: 6px 14px;
      color: var(--muted);
    }
    .count-badge strong {
      color: var(--blue);
      font-weight: 700;
    }

    /* ── BARRA SUPERIOR ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-box {
      flex: 1;
      position: relative;
    }
    .search-box input {
      width: 100%;
      border: 1.5px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      padding: 13px 16px 13px 42px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: rgba(181,138,42,.5); }
    .search-box .ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 15px;
    }
    .btn-add {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 20px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .18s, transform .18s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: .88; transform: translateY(-1px); }

    /* ── LETRAS ── */
    .letter-group { margin-bottom: 4px; }
    .letter-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 18px 0 8px 4px;
    }

    /* ── ITEM ── */
    .fav-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1.5px solid var(--line);
      border-radius: 14px;
      padding: 13px 16px;
      margin-bottom: 7px;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .fav-item:hover {
      border-color: rgba(181,138,42,.35);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .fav-link {
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }
    .fav-favicon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .fav-favicon img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }
    .fav-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-domain {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .fav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-open {
      background: rgba(24,38,66,.06);
      border: none;
      border-radius: 9px;
      padding: 7px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--blue);
      cursor: pointer;
      transition: background .16s;
      text-decoration: none;
    }
    .btn-open:hover { background: rgba(24,38,66,.12); }
    .btn-del {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      transition: all .16s;
    }
    .btn-del:hover {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: rgba(180,35,24,.15);
    }
    .btn-rename {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      transition: all .16s;
      opacity: 0;
    }
    .fav-item:hover .btn-rename { opacity: 1; }
    .btn-rename:hover {
      background: #f0eadf;
      border-color: rgba(181,138,42,.25);
      color: var(--gold);
    }
    .fav-name-input {
      border: 1.5px solid rgba(181,138,42,.5);
      background: #fffdf7;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      color: var(--text);
      outline: none;
      width: 100%;
      min-width: 120px;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty span { font-size: 32px; display: block; margin-bottom: 10px; }

    /* ── MODAL AGREGAR ── */
    dialog {
      border: none;
      border-radius: 24px;
      padding: 28px;
      width: min(480px, calc(100% - 28px));
      background: var(--panel);
      box-shadow: 0 30px 100px rgba(0,0,0,.2);
    }
    dialog::backdrop {
      background: rgba(24,38,66,.4);
      backdrop-filter: blur(6px);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    .modal-head h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--blue);
    }
    .modal-head p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .btn-close {
      background: rgba(0,0,0,.06);
      border: none;
      border-radius: 10px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 16px;
      transition: background .16s;
    }
    .btn-close:hover { background: rgba(0,0,0,.1); }
    .form-field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }
    .form-field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .form-field input {
      border: 1.5px solid var(--line);
      background: var(--bg);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .form-field input:focus { border-color: rgba(181,138,42,.5); background: #fff; }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn-save {
      flex: 1;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .16s;
    }
    .btn-save:hover { opacity: .88; }
    .btn-cancel {
      padding: 14px 20px;
      background: rgba(0,0,0,.05);
      border: none;
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
      transition: background .16s;
    }
    .btn-cancel:hover { background: rgba(0,0,0,.09); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--blue);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.danger { background: var(--danger); }

    /* ── SCROLL LETTERS SIDEBAR (decorativo) ── */
    footer {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
    }

    @media (max-width: 600px) {
      .shell { padding: 22px 0 40px; }
      .header { flex-wrap: wrap; gap: 10px; }
      .fav-item { grid-template-columns: 1fr; }
      .fav-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

  <div class="form-field">
    <label>URL</label>
    <input id="inp-url" placeholder="https://…" autocomplete="off" type="url">
  </div>
  <div class="form-actions">
    <button class="btn-cancel" id="cancelModal">Cancelar</button>
    <button class="btn-save" id="saveLink">Guardar favorito</button>
  </div>
</dialog>

const STORAGE_KEY = 'pako_favs_v3';

const BASE_LINKS = [{"id":"google-calendar-calendar-google-com","name":"Google Calendar -","url":"https://calendar.google.com/calendar/u/0/r"},{"id":"google-meet-meet-google-com","name":"Google Meet","url":"https://meet.google.com/?hs=197&authuser=0"},{"id":"google-drive-drive-google-com","name":"Google Drive","url":"https://drive.google.com/drive/u/0/my-drive"},{"id":"notebooklm-notebooklm-google-com","name":"NotebookLM","url":"https://notebooklm.google.com/"},{"id":"claude-design-claude-ai","name":"Claude Design","url":"https://claude.ai/design"},{"id":"perplexity-perplexity-ai","name":"Perplexity","url":"https://www.perplexity.ai/?utm_source=chatgpt.com"},{"id":"inicio-canva-canva-com","name":"Inicio - Canva","url":"https://www.canva.com/?continue_in_browser=true"},{"id":"meetgeek-app2-meetgeek-ai","name":"MeetGeek","url":"https://app2.meetgeek.ai/past-meetings"},{"id":"titan-app-titan-email","name":"Titan","url":"https://app.titan.email/mail/"},{"id":"mail-en-icloud-icloud-com","name":"Mail en iCloud","url":"https://www.icloud.com/mail/"},{"id":"envato-elements-envato-com","name":"Envato","url":"https://elements.envato.com/es/"},{"id":"instagram-instagram-com","name":"Instagram","url":"https://www.instagram.com/"},{"id":"youtube-youtube-com","name":"YouTube","url":"https://www.youtube.com/?hl=es"},{"id":"bepensa-cxp-bepensa-com","name":"Bepensa","url":"https://cxp.bepensa.com/edocrecibo.fv2lite.web/Login.aspx"},{"id":"sistema-para-la-generacion","name":"Sistema para la generación y envío de Comprobantes Fiscales Digitales","url":"https://cfd.sicofi.com.mx/Sicofi/Main"},{"id":"freepik-freepik-es","name":"Freepik","url":"https://www.freepik.es/"},{"id":"icloud-icloud-com","name":"iCloud","url":"https://www.icloud.com/"},{"id":"meta-business-suite-business-facebook-com","name":"Meta Business Suite","url":"https://business.facebook.com/latest/home"},{"id":"spotify-open-spotify-com","name":"Spotify","url":"https://open.spotify.com/intl-es/#_=_"},{"id":"hostgator-clie mentor"},{"id":"github-pakostudio","name":"GITHUB","url":"https://github.com/pakostudio"},{"id":"sm-soluciones","name":"SM Soluciones — Credenciales","url":"https://pakostudio.github.io/SM-Soluciones/#contacto"},{"id":"smsoluciones-elementor","name":"SMSoluciones Elementor","url":"https://smsoluciones-group.com.mx/wp-admin/post.php?post=138&action=elementor"},{"id":"cpanel-mavas","name":"cPanel - Monitorizar el envío","url":"https://mavas.com.mx:2083/cpsess2245282101/frontend/jupiter/mail/route.html"},{"id":"tdi-facturacion","name":"TDI Control · Facturación","url":"https://pakostudio.github.io/facturacion/"},{"id":"menlun-crm","name":"Menlun CRM","url":"https://pakostudio.github.io/Menlun/"},{"id":"catalogo-pmps","name":"Catalogo PMPS","url":"https://pakostudio.github.io/pmps-menlun/"},{"id":"correo-juan-bosco","name":"Correo: Juan Bosco - Outlook","url":"https://outlook.cloud.microsoft/mail/inbox/"},{"id":"impi","name":"IMPI – Instituto Mexicano de la Propiedad Industrial","url":"https://marcaenlinea.impi.gob.mx/MarcaEnLinea/vistas/solicitud/tableros/SolicitudesEnPreparacion.jsf"},{"id":"ofunam-crm","name":"OFUNAM · CRM Patrocinadores","url":"https://pakostudio.github.io/ofunam-leads/"},{"id":"menlun-leads","name":"MENLUN — Sistema de Leads","url":"https://pakostudio.github.io/menlun-prospectos/"},{"id":"learningstudioai","name":"Create courses with AI - LearningStudioAI","url":"https://learningstudioai.com/courses"},{"id":"main-panamsports","name":"Main","url":"https://www.panamsportschannel.org/main"},{"id":"vizard","name":"Vizard","url":"https://vizard.ai/"},{"id":"webpako","name":"webpako","url":"https://pakoayala.com/wp-admin/"},{"id":"drive-bobby","name":"Drive Bobby","url":"https://drive.google.com/drive/folders/1-3lsmcF_LJ8EjrTRmhYik-xQUJi6QniM"},{"id":"angeles-cd-mexico","name":"Ángeles CD Mexico - Google Drive","url":"https://drive.google.com/drive/folders/1_kUOMSGd0UwDBtbNG9De53omI8VlwqBM"},{"id":"inbox-timehero","name":"Inbox – TimeHero","url":"https://app.timehero.com/#!/app/work/inbox"},{"id":"kindle-direct","name":"Kindle Direct Publishing de Amazon","url":"https://kdp.amazon.com/es_ES/bookshelf"},{"id":"learn-anything","name":"Learn anything","url":"https://www.tutorai.me/"}];

// ── STATE ──
function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch {}
  return BASE_LINKS.map(l => ({...l}));
}
function save(links) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
}

let links = load();
let query = '';

// ── UTILS ──
function norm(str) {
  return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function uid() {
  return 'fav-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6);
}
function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; }
}
function getFaviconUrl(url) {
  try {
    const hostname = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${hostname}&sz=32`;
  } catch { return ''; }
}
function esc(str) {
  return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

// ── RENDER ──
function render() {
  const el = document.getElementById('list');
  let filtered = links;
  if (query) {
    const q = norm(query);
    filtered = links.filter(l => norm(l.name + ' ' + l.url).includes(q));
  }

  const sorted = [...filtered].sort((a, b) =>
    norm(a.name).localeCompare(norm(b.name))
  );

  document.getElementById('countNum').textContent = links.length;

  if (!sorted.length) {
    el.innerHTML = `<div class="empty"><span>🔍</span>${query ? 'Sin resultados para "' + esc(query) + '"' : 'Sin favoritos. ¡Agrega el primero!'}</div>`;
    return;
  }

  // Group by first letter
  const groups = {};
  sorted.forEach(l => {
    const letter = norm(l.name[0]).toUpperCase().replace(/[^A-Z]/, '#');
    (groups[letter] ||= []).push(l);
  });

  const letterOrder = Object.keys(groups).sort((a, b) => {
    if (a === '#') return 1;
    if (b === '#') return -1;
    return a.localeCompare(b);
  });

  el.innerHTML = letterOrder.map(letter => `
    <div class="letter-group">
      <div class="letter-label">${letter}</div>
      ${groups[letter].map(l => `
        <div class="fav-item" data-id="${esc(l.id)}">
          <a class="fav-link" href="${esc(l.url)}" target="_blank" rel="noopener noreferrer">
            <div class="fav-favicon">
              <img src="${esc(getFaviconUrl(l.url))}" alt="" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div>
              <div class="fav-name">${esc(l.name)}</div>
              <div class="fav-domain">${esc(getDomain(l.url))}</div>
            </div>
          </a>
          <div class="fav-actions">
            <button class="btn-rename" data-rename="${esc(l.id)}" title="Renombrar">✏️</button>
            <a class="btn-open" href="${esc(l.url)}" target="_blank" rel="noopener noreferrer">↗ Abrir</a>
            <button class="btn-del" data-del="${esc(l.id)}" title="Eliminar">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ── EVENTS ──
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

// Delete & Rename
document.getElementById('list').addEventListener('click', e => {
  // Delete
  const delId = e.target.dataset.del;
  if (delId) {
    const link = links.find(l => l.id === delId);
    if (!link) return;
    if (!confirm(`Eliminar "${link.name}" de favoritos?`)) return;
    links = links.filter(l => l.id !== delId);
    save(links);
    render();
    showToast(`"${link.name}" eliminado`, true);
    return;
  }

  // Rename via button
  const renameId = e.target.dataset.rename;
  if (renameId) {
    e.preventDefault();
    startRename(renameId);
  }
});

// Double-click on name to rename
document.getElementById('list').addEventListener('dblclick', e => {
  const nameEl = e.target.closest('.fav-name');
  if (!nameEl) return;
  const item = nameEl.closest('.fav-item');
  if (!item) return;
  e.preventDefault();
  startRename(item.dataset.id);
});

function startRename(id) {
  const link = links.find(l => l.id === id);
  if (!link) return;

  const item = document.querySelector(`.fav-item[data-id="${id}"]`);
  if (!item) return;
  const nameEl = item.querySelector('.fav-name');
  if (!nameEl || nameEl.querySelector('input')) return; // ya está editando

  const original = link.name;
  const input = document.createElement('input');
  input.className = 'fav-name-input';
  input.value = original;
  nameEl.textContent = '';
  nameEl.appendChild(input);
  input.focus();
  input.select();

  function commitRename() {
    const newName = input.value.trim();
    if (newName && newName !== original) {
      link.name = newName;
      save(links);
      showToast(`Renombrado a "${newName}"`);
      render(); // re-render para reordenar si aplica
    } else {
      nameEl.textContent = original;
    }
  }

  input.addEventListener('blur', commitRename);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      input.removeEventListener('blur', commitRename);
      nameEl.textContent = original;
    }
  });
}

// Modal
const modal = document.getElementById('addModal');
document.getElementById('openAdd').addEventListener('click', () => {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
  modal.showModal();
  setTimeout(() => document.getElementById('inp-name').focus(), 50);
});
document.getElementById('closeModal').addEventListener('click', () => modal.close());
document.getElementById('cancelModal').addEventListener('click', () => modal.close());

// Save
document.getElementById('saveLink').addEventListener('click', () => {
  const name = document.getElementById('inp-name').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  if (!url || !/^https?:\/\//i.test(url)) {
    alert('La URL debe empezar con https:// o http://');
    document.getElementById('inp-url').focus();
    return;
  }
  links.push({ id: uid(), name, url });
  save(links);
  modal.close();
  render();
  showToast(`"${name}" agregado`);
});

// Enter en modal
modal.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('saveLink').click();
  }
  if (e.key === 'Escape') modal.close();
});

// Global ⌘K
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// Toast
function showToast(msg, danger = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (danger ? ' danger' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

render();
</script>
</body>
</html>
