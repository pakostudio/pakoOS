<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PAKO OS</title>
  <meta name="description" content="PAKO OS Command Center">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">P</div>
        <div>
          <p class="eyebrow">PAKO STUDIO SYSTEM</p>
          <h1 id="brandTitle">PAKO OS</h1>
        </div>
      </div>
      <div class="timebox">
        <span id="dateText">Hoy</span>
        <strong id="timeText">--:--</strong>
      </div>
    </header>

    <section class="hero">
      <div>
        <p id="subtitle" class="subtitle">Command Center</p>
        <div class="search-wrap">
          <span>⌘</span>
          <input id="search" placeholder="Buscar: GPC, Shopify, Canva, MeetGeek, SAT, Drive..." autocomplete="off">
        </div>
      </div>
      <aside class="metrics">
        <div><span>Links</span><strong id="totalLinks">0</strong></div>
        <div><span>Categorías</span><strong id="totalCategories">0</strong></div>
        <div><span>Modo</span><strong>Focus</strong></div>
      </aside>
    </section>

    <section class="quick">
      <div class="section-title">
        <h2>Accesos rápidos</h2>
        <p>Lo que debe abrir en un clic.</p>
      </div>
      <div id="quickActions" class="quick-grid"></div>
    </section>

    <main>
      <div class="section-title">
        <h2>Command Center</h2>
        <p>Busca o entra por categoría.</p>
      </div>
      <div id="cards" class="cards"></div>
    </main>

    <footer>
      <span id="tagline">Where strategy becomes perception</span>
      <span>PAKO OS v2.0 · GitHub Pages Ready</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
